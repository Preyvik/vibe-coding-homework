# Codex CLI configuration — see https://github.com/openai/codex for full reference.
# Documented values are conservative defaults. Override per-invocation with `-c key=value`.

# Default model. Change to whichever you have access to (e.g. "gpt-5-codex", "o3", etc).
model = "gpt-5-codex"

# Approval policy controls when Codex pauses for the user before running actions.
#   "untrusted"  — ask before any non-read action (safest)
#   "on-failure" — only ask if a command fails
#   "on-request" — ask only when Codex itself requests approval
#   "never"      — never ask (risky; combine with a strict sandbox)
approval_policy = "on-failure"

# Sandbox mode for tool execution.
#   "read-only"        — Codex can only read files
#   "workspace-write"  — Codex can edit files inside the workspace, no network
#   "danger-full-access" — no sandbox, full host access (use only when you know why)
sandbox_mode = "workspace-write"

# Inherit the parent shell environment so PATH, language tooling, etc. are available.
[shell_environment_policy]
inherit = "all"

# ---------- MCP servers ----------
# `everything` is the official reference MCP server from the Model Context
# Protocol authors (https://github.com/modelcontextprotocol/servers). It bundles
# example tools, prompts and resources, so it doubles as a smoke test that the
# MCP wiring works. No API key — spawned on demand via `npx`.
[mcp_servers.everything]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-everything"]
